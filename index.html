<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reh Dogg Games Plus | DEEP PINBALL (Underwater Arcade)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #02112a, #00040c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', 'Press Start 2P', monospace;
            padding: 20px;
        }

        /* arcade cabinet shell */
        .pinball-cabinet {
            background: linear-gradient(145deg, #0c1a2f, #030b17);
            border-radius: 48px;
            padding: 20px 24px 30px;
            border: 3px solid #0ff7ff;
            box-shadow: 0 0 0 6px #0a2a3a, 0 20px 40px black, inset 0 0 20px rgba(0,255,255,0.3);
        }

        .marquee {
            text-align: center;
            background: #021a24;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 20px;
            border-bottom: 3px solid cyan;
            box-shadow: inset 0 0 12px cyan, 0 6px 0 #003344;
        }

        .marquee h1 {
            margin: 0;
            font-size: clamp(1.4rem, 5vw, 2.4rem);
            letter-spacing: 4px;
            background: linear-gradient(135deg, cyan, #4effe0, #0077ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px cyan;
        }

        .marquee p {
            color: #7ffbff;
            margin: 5px 0 0;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .game-area {
            display: flex;
            justify-content: center;
            position: relative;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #0cf, 0 12px 28px black;
            cursor: none;
            background: #00141f;
            width: 100%;
            height: auto;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
            background: #04121ecc;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 10px 20px;
            border: 1px solid cyan;
        }

        .score-card {
            background: #010a12;
            border-radius: 28px;
            padding: 8px 20px;
            text-align: center;
            flex: 1;
            box-shadow: inset 0 0 8px #0ff3, 0 5px 0 #002b3b;
        }

        .score-card span:first-child {
            font-size: 0.8rem;
            color: #8dd0ff;
            letter-spacing: 1px;
        }

        .score-card .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 8px #ffaa33;
            font-family: monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            background: #0f212e;
            border: none;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
            padding: 10px 28px;
            border-radius: 60px;
            color: cyan;
            box-shadow: 0 6px 0 #002c3d;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #002c3d;
        }

        .mobile-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 12px;
        }

        .flip-btn {
            background: radial-gradient(circle at 30% 20%, #2a6f8f, #042c3b);
            width: 100px;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 6px cyan;
            border: 1px solid cyan;
            cursor: pointer;
            box-shadow: 0 6px 0 #001e2a;
        }

        .flip-btn:active {
            transform: translateY(4px);
        }

        @media (max-width: 700px) {
            .pinball-cabinet { padding: 12px; }
            .score-card .value { font-size: 1.2rem; }
            .ctrl-btn { padding: 6px 16px; font-size: 0.9rem; }
            .flip-btn { width: 70px; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="pinball-cabinet">
    <div class="marquee">
        <h1>🐙 REH DOGG: DEEP PINBALL 🐟</h1>
        <p>⚡ UNDERWATER ARCADE · KRAKEN BONUS ⚡</p>
    </div>
    <div class="game-area">
        <canvas id="pinballCanvas" width="800" height="700" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/700"></canvas>
    </div>
    <div class="score-panel">
        <div class="score-card"><span>🐚 SCORE</span><div class="value" id="scoreValue">0</div></div>
        <div class="score-card"><span>💎 BONUS MULT</span><div class="value" id="bonusMult">1x</div></div>
        <div class="score-card"><span>🦑 BALLS</span><div class="value" id="ballsLeft">3</div></div>
    </div>
    <div class="controls">
        <button class="ctrl-btn" id="launchBtn">🚀 LAUNCH BALL</button>
        <button class="ctrl-btn" id="resetBtn">🔄 NEW GAME</button>
    </div>
    <div class="mobile-buttons">
        <div class="flip-btn" id="leftFlipBtn">◀ LEFT FLIP</div>
        <div class="flip-btn" id="rightFlipBtn">RIGHT FLIP ▶</div>
    </div>
    <div style="text-align: center; margin-top: 12px; font-size: 0.7rem; color: #4fa5c2;">▼ Use A / S keys (left/right flippers) | SPACE to launch ▼</div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('pinballCanvas');
        const ctx = canvas.getContext('2d');
        
        // ---------- GAME DIMENSIONS ----------
        const W = 800, H = 700;
        canvas.width = W; canvas.height = H;
        
        // ---------- PHYSICS ----------
        let ball = { x: W/2, y: 550, vx: 0, vy: 0, radius: 7, active: true };
        let score = 0;
        let ballsLeft = 3;
        let multiplier = 1;
        let gameOver = false;
        let launchReady = true;
        
        // flippers
        let leftFlipper = { x: 170, y: 590, angle: 0, targetAngle: 0, length: 65, width: 12 };
        let rightFlipper = { x: W - 170, y: 590, angle: 0, targetAngle: 0, length: 65, width: 12 };
        
        // bumpers (glowing sea creatures)
        const bumpers = [
            { x: 200, y: 240, r: 18, points: 150, name: "🐡" },
            { x: 600, y: 220, r: 18, points: 150, name: "🐙" },
            { x: 400, y: 150, r: 22, points: 250, name: "🪸" },
            { x: 280, y: 380, r: 16, points: 100, name: "🐠" },
            { x: 520, y: 390, r: 16, points: 100, name: "🐟" },
            { x: 100, y: 460, r: 14, points: 80, name: "🦐" },
            { x: 700, y: 470, r: 14, points: 80, name: "🦀" },
            { x: 400, y: 310, r: 20, points: 200, name: "🧜‍♀️" }
        ];
        
        // targets (static points)
        let targets = [
            { x: 130, y: 180, w: 28, h: 28, active: true, points: 500, name: "💎" },
            { x: 640, y: 170, w: 28, h: 28, active: true, points: 500, name: "⚓" },
            { x: 350, y: 80, w: 40, h: 30, active: true, points: 1000, name: "👑 KRAKEN" }
        ];
        
        // walls boundaries (simple)
        const leftWall = 25;
        const rightWall = W - 25;
        const topDead = 55;    // top gutter (score / lost ball)
        const bottomDead = H - 15;
        
        // flipper physics helpers
        function updateFlippers() {
            leftFlipper.angle += (leftFlipper.targetAngle - leftFlipper.angle) * 0.38;
            rightFlipper.angle += (rightFlipper.targetAngle - rightFlipper.angle) * 0.38;
        }
        
        function setLeftFlip(up) { leftFlipper.targetAngle = up ? 0.65 : 0; }
        function setRightFlip(up) { rightFlipper.targetAngle = up ? -0.65 : 0; }
        
        // collision helpers
        function rotatePoint(px, py, cx, cy, angle) {
            const s = Math.sin(angle);
            const c = Math.cos(angle);
            const dx = px - cx;
            const dy = py - cy;
            return { x: cx + dx * c - dy * s, y: cy + dx * s + dy * c };
        }
        
        function flipperCollision(ball, flipper, isLeft) {
            let fx = isLeft ? leftFlipper.x : rightFlipper.x;
            let fy = flipper.y;
            let angle = flipper.angle;
            let length = flipper.length;
            let tipX = fx + Math.cos(angle) * length;
            let tipY = fy + Math.sin(angle) * length;
            let baseX = fx, baseY = fy;
            
            // line segment from base to tip
            const ABx = tipX - baseX;
            const ABy = tipY - baseY;
            const len2 = ABx*ABx + ABy*ABy;
            if(len2 === 0) return false;
            const t = ((ball.x - baseX)*ABx + (ball.y - baseY)*ABy) / len2;
            const clamped = Math.min(1, Math.max(0, t));
            const closestX = baseX + ABx * clamped;
            const closestY = baseY + ABy * clamped;
            const dx = ball.x - closestX;
            const dy = ball.y - closestY;
            const dist = Math.hypot(dx, dy);
            if(dist < ball.radius + flipper.width/2) {
                // direction impulse
                const normalX = dx / dist;
                const normalY = dy / dist;
                const speed = Math.hypot(ball.vx, ball.vy);
                let impulse = 6 + speed * 0.6;
                if( (isLeft && angle > 0.2) || (!isLeft && angle < -0.2) ) impulse *= 1.5;
                ball.vx += normalX * impulse;
                ball.vy += normalY * impulse;
                // push out
                const overlap = (ball.radius + flipper.width/2) - dist;
                ball.x += normalX * overlap;
                ball.y += normalY * overlap;
                return true;
            }
            return false;
        }
        
        function handleCollisions() {
            if(!ball.active) return;
            // walls
            if(ball.x - ball.radius < leftWall) { ball.x = leftWall + ball.radius; ball.vx = -ball.vx * 0.95; }
            if(ball.x + ball.radius > rightWall) { ball.x = rightWall - ball.radius; ball.vx = -ball.vx * 0.95; }
            if(ball.y - ball.radius < topDead) { 
                // gutter: ball lost
                ball.active = false;
                return;
            }
            if(ball.y + ball.radius > bottomDead) { ball.y = bottomDead - ball.radius; ball.vy = -ball.vy * 0.85; }
            
            // flippers
            flipperCollision(ball, leftFlipper, true);
            flipperCollision(ball, rightFlipper, false);
            
            // bumpers
            for(let b of bumpers) {
                const dx = ball.x - b.x;
                const dy = ball.y - b.y;
                const dist = Math.hypot(dx, dy);
                if(dist < ball.radius + b.r) {
                    const angle = Math.atan2(dy, dx);
                    const force = 8;
                    ball.vx += Math.cos(angle) * force;
                    ball.vy += Math.sin(angle) * force;
                    const overlap = (ball.radius + b.r) - dist;
                    ball.x += Math.cos(angle) * overlap;
                    ball.y += Math.sin(angle) * overlap;
                    // add score with multiplier
                    let add = b.points * multiplier;
                    score += add;
                    updateUI();
                    // juice: flash bumper
                    b.flash = 6;
                    // kraken bonus random chance
                    if(b.name === "🧜‍♀️" && Math.random() < 0.3) {
                        multiplier = Math.min(5, multiplier+1);
                        updateUI();
                        showMessage("MULTIPLIER UP! x"+multiplier);
                    }
                }
            }
            
            // targets
            for(let t of targets) {
                if(!t.active) continue;
                if(ball.x + ball.radius > t.x && ball.x - ball.radius < t.x + t.w &&
                   ball.y + ball.radius > t.y && ball.y - ball.radius < t.y + t.h) {
                    t.active = false;
                    let add = t.points * multiplier;
                    score += add;
                    updateUI();
                    showMessage(`+${add} ${t.name}`);
                    if(t.name === "👑 KRAKEN") {
                        multiplier = Math.min(6, multiplier+2);
                        updateUI();
                        showMessage("🦑 KRAKEN BONUS! MULTIPLIER x"+multiplier);
                    }
                    // tiny bounce
                    ball.vy -= 3;
                    ball.vx += (Math.random() - 0.5)*2;
                }
            }
            
            // little friction
            ball.vx *= 0.998;
            ball.vy += 0.28; // gravity
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // speed cap
            let maxSpeed = 14;
            if(Math.abs(ball.vx) > maxSpeed) ball.vx = ball.vx>0?maxSpeed:-maxSpeed;
            if(Math.abs(ball.vy) > maxSpeed) ball.vy = ball.vy>0?maxSpeed:-maxSpeed;
        }
        
        // UI updates
        function updateUI() {
            document.getElementById('scoreValue').innerText = Math.floor(score);
            document.getElementById('bonusMult').innerText = multiplier+"x";
            document.getElementById('ballsLeft').innerText = ballsLeft;
        }
        
        let message = "";
        let messageTimer = 0;
        function showMessage(msg) {
            message = msg;
            messageTimer = 45;
        }
        
        function loseBall() {
            if(!ball.active) {
                ballsLeft--;
                updateUI();
                if(ballsLeft <= 0) {
                    gameOver = true;
                    showMessage("💀 GAME OVER 💀");
                } else {
                    resetBallPosition();
                    launchReady = true;
                    showMessage("🔁 BALL LOST · PRESS LAUNCH 🔁");
                }
            }
        }
        
        function resetBallPosition() {
            ball.active = true;
            ball.x = W/2;
            ball.y = 570;
            ball.vx = 0;
            ball.vy = 0;
            launchReady = true;
        }
        
        function launchBall() {
            if(gameOver) return;
            if(!ball.active) resetBallPosition();
            if(launchReady && ball.active) {
                ball.vx = (Math.random() - 0.5) * 2.2;
                ball.vy = -9.5;
                launchReady = false;
                showMessage("💨 LAUNCHED!");
            }
        }
        
        function resetGame() {
            score = 0;
            ballsLeft = 3;
            multiplier = 1;
            gameOver = false;
            for(let t of targets) t.active = true;
            resetBallPosition();
            launchReady = true;
            ball.active = true;
            updateUI();
            showMessage("🆕 NEW GAME · DIVE IN!");
        }
        
        // animations & drawing (underwater theme)
        let particles = [];
        function addSplash(x,y) {
            for(let i=0;i<8;i++) particles.push({x:x,y:y,life:20, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3-1});
        }
        
        function draw() {
            ctx.clearRect(0,0,W,H);
            // deep water gradient
            const grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,"#022b44");
            grad.addColorStop(1,"#00101c");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,W,H);
            
            // glowing grid lines (sonar)
            ctx.strokeStyle = "rgba(0,210,255,0.2)";
            for(let i=0;i<10;i++) { ctx.beginPath(); ctx.moveTo(0,i*70); ctx.lineTo(W,i*70); ctx.stroke(); }
            
            // bumpers
            for(let b of bumpers) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#0ff";
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r-2, 0, Math.PI*2);
                ctx.fillStyle = "#0d5b70";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r-4, 0, Math.PI*2);
                ctx.fillStyle = "#0f9ac0";
                ctx.fill();
                ctx.font = `${b.r+6}px monospace`;
                ctx.fillStyle = "white";
                ctx.shadowBlur = 8;
                ctx.fillText(b.name, b.x-12, b.y+8);
                if(b.flash) { b.flash--; ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r+4, 0, Math.PI*2); ctx.fill(); }
            }
            
            // targets
            for(let t of targets) {
                if(t.active) {
                    ctx.fillStyle = "#ffb347";
                    ctx.shadowColor = "orange";
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.fillStyle = "#11212e";
                    ctx.font = "20px monospace";
                    ctx.fillText(t.name, t.x+5, t.y+22);
                }
            }
            
            // flippers (coral style)
            ctx.shadowBlur = 6;
            ctx.fillStyle = "#2a8c6e";
            ctx.shadowColor = "#0ff";
            drawFlipper(leftFlipper, true);
            drawFlipper(rightFlipper, false);
            
            // ball (pearl)
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius-1, 0, Math.PI*2);
            ctx.fillStyle = "#feffd2";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ball.x-2, ball.y-2, 2, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            
            // particles
            for(let i=0;i<particles.length;i++) {
                let p = particles[i];
                ctx.fillStyle = `rgba(100,255,200,${p.life/20})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fill();
                p.x+=p.vx; p.y+=p.vy;
                p.life--;
                if(p.life<=0) particles.splice(i,1);
            }
            
            // message
            if(messageTimer>0) {
                ctx.font = "bold 20px monospace";
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#ffffbb";
                ctx.shadowColor = "cyan";
                ctx.fillText(message, W/2-ctx.measureText(message).width/2, 80);
                messageTimer--;
            }
            
            if(gameOver) {
                ctx.font = "36px monospace";
                ctx.fillStyle = "#ff5555";
                ctx.shadowBlur = 8;
                ctx.fillText("GAME OVER", W/2-110, H/2);
            }
            ctx.shadowBlur = 0;
        }
        
        function drawFlipper(flip, isLeft) {
            let angle = flip.angle;
            let fx = flip.x;
            let fy = flip.y;
            let length = flip.length;
            let tipX = fx + Math.cos(angle) * length;
            let tipY = fy + Math.sin(angle) * length;
            ctx.beginPath();
            ctx.moveTo(fx, fy);
            ctx.lineTo(tipX, tipY);
            ctx.lineWidth = flip.width;
            ctx.strokeStyle = "#6effb0";
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(fx, fy, 8, 0, Math.PI*2);
            ctx.fillStyle = "#47c9a5";
            ctx.fill();
        }
        
        function updatePhysics() {
            if(!gameOver && ball.active) {
                handleCollisions();
                if(!ball.active) loseBall();
            } else if(gameOver) {
                // nothing
            }
            updateFlippers();
        }
        
        // animate
        function animate() {
            updatePhysics();
            draw();
            requestAnimationFrame(animate);
        }
        
        // event listeners
        function initEvents() {
            window.addEventListener('keydown', (e) => {
                if(e.code === 'KeyA') { setLeftFlip(true); e.preventDefault(); }
                if(e.code === 'KeyS') { setRightFlip(true); e.preventDefault(); }
                if(e.code === 'Space') { launchBall(); e.preventDefault(); }
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'KeyA') setLeftFlip(false);
                if(e.code === 'KeyS') setRightFlip(false);
            });
            document.getElementById('leftFlipBtn').addEventListener('touchstart', (e) => { setLeftFlip(true); e.preventDefault(); });
            document.getElementById('leftFlipBtn').addEventListener('touchend', () => setLeftFlip(false));
            document.getElementById('rightFlipBtn').addEventListener('touchstart', (e) => { setRightFlip(true); e.preventDefault(); });
            document.getElementById('rightFlipBtn').addEventListener('touchend', () => setRightFlip(false));
            document.getElementById('leftFlipBtn').addEventListener('mousedown', () => setLeftFlip(true));
            document.getElementById('leftFlipBtn').addEventListener('mouseup', () => setLeftFlip(false));
            document.getElementById('rightFlipBtn').addEventListener('mousedown', () => setRightFlip(true));
            document.getElementById('rightFlipBtn').addEventListener('mouseup', () => setRightFlip(false));
            document.getElementById('launchBtn').addEventListener('click', () => launchBall());
            document.getElementById('resetBtn').addEventListener('click', () => resetGame());
        }
        
        // start
        resetGame();
        initEvents();
        animate();
        
        // dynamic bumper flash refresh
        setInterval(()=>{
            for(let b of bumpers) if(b.flash && b.flash>0) b.flash--;
        }, 60);
    })();
</script>
</body>
</html>
