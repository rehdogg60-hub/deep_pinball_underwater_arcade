<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reh Dogg: DEEP PINBALL | Underwater Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #02112a, #00040c);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', 'VT323', monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #gameContainer {
            position: relative;
            background: linear-gradient(145deg, #0c1a2f, #030b17);
            border-radius: 32px;
            padding: 15px 20px 20px;
            border: 3px solid #0ff7ff;
            box-shadow: 0 0 0 6px #0a2a3a, 0 20px 40px black;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,255,255,0.2), 0 8px 20px black;
            cursor: none;
            background: #00141f;
            width: 100%;
            height: auto;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 15px;
            background: rgba(4,18,30,0.9);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 10px 20px;
            border: 1px solid cyan;
        }

        .info-card {
            background: #010a12;
            border-radius: 28px;
            padding: 6px 18px;
            text-align: center;
            flex: 1;
            box-shadow: inset 0 0 8px #0ff3, 0 4px 0 #002b3b;
        }

        .info-card span:first-child {
            font-size: 0.7rem;
            color: #8dd0ff;
            letter-spacing: 2px;
        }

        .info-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 8px #ffaa33;
            font-family: monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            background: #0f212e;
            border: none;
            font-weight: bold;
            font-family: monospace;
            font-size: 1rem;
            padding: 8px 24px;
            border-radius: 60px;
            color: cyan;
            box-shadow: 0 5px 0 #002c3d;
            cursor: pointer;
            transition: 0.03s linear;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #002c3d;
        }

        .flipper-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 10px;
        }

        .flip-btn {
            background: radial-gradient(circle at 30% 20%, #2a6f8f, #042c3b);
            width: 90px;
            padding: 10px;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            color: white;
            border: 1px solid cyan;
            cursor: pointer;
            box-shadow: 0 5px 0 #001e2a;
            font-size: 0.9rem;
        }

        .flip-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #001e2a;
        }

        @media (max-width: 700px) {
            .info-value { font-size: 1.2rem; }
            button { padding: 6px 16px; font-size: 0.8rem; }
            .flip-btn { width: 70px; padding: 8px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="pinballCanvas" width="600" height="700" style="width:100%; max-width:600px; aspect-ratio:600/700"></canvas>
    <div class="info-panel">
        <div class="info-card"><span>🐚 SCORE</span><div class="info-value" id="scoreValue">0</div></div>
        <div class="info-card"><span>💎 MULTI</span><div class="info-value" id="multValue">1x</div></div>
        <div class="info-card"><span>🦑 BALLS</span><div class="info-value" id="ballsValue">3</div></div>
    </div>
    <div class="controls">
        <button id="launchBtn">🚀 LAUNCH BALL</button>
        <button id="resetBtn">🔄 NEW GAME</button>
    </div>
    <div class="flipper-buttons">
        <div class="flip-btn" id="leftFlipBtn">◀ LEFT</div>
        <div class="flip-btn" id="rightFlipBtn">RIGHT ▶</div>
    </div>
    <div style="text-align: center; margin-top: 10px; font-size: 0.65rem; color: #4fa5c2;">▼ A / S keys | SPACE to launch ▼</div>
</div>

<script>
(function(){
    // CANVAS
    const canvas = document.getElementById('pinballCanvas');
    const ctx = canvas.getContext('2d');
    const W = 600, H = 700;
    canvas.width = W; canvas.height = H;

    // GAME STATE
    let score = 0;
    let multiplier = 1;
    let ballsLeft = 3;
    let gameOver = false;
    let ballActive = true;
    let launchReady = true;

    // BALL PHYSICS
    let ball = {
        x: W/2,
        y: 580,
        vx: 0,
        vy: 0,
        r: 6
    };

    // FLIPPERS (classic pinball style)
    let leftFlipper = {
        x: 100,
        y: 610,
        angle: 0,
        targetAngle: 0,
        length: 55,
        up: -0.65,
        down: 0.15
    };
    
    let rightFlipper = {
        x: W - 100,
        y: 610,
        angle: 0,
        targetAngle: 0,
        length: 55,
        up: 0.65,
        down: -0.15
    };

    // UNDERWATER BUMPERS
    let bumpers = [
        { x: 150, y: 220, r: 16, points: 150, flash: 0, color: "#0ff", name: "🐡" },
        { x: 450, y: 200, r: 16, points: 150, flash: 0, color: "#0ff", name: "🐙" },
        { x: 300, y: 130, r: 20, points: 250, flash: 0, color: "#f0f", name: "🪸" },
        { x: 200, y: 360, r: 14, points: 100, flash: 0, color: "#ff0", name: "🐠" },
        { x: 400, y: 370, r: 14, points: 100, flash: 0, color: "#ff0", name: "🐟" },
        { x: 80, y: 450, r: 12, points: 80, flash: 0, color: "#0fa", name: "🦐" },
        { x: 520, y: 460, r: 12, points: 80, flash: 0, color: "#0fa", name: "🦀" },
        { x: 300, y: 290, r: 18, points: 200, flash: 0, color: "#f6f", name: "🧜‍♀️" }
    ];

    // STATIC TARGETS
    let targets = [
        { x: 90, y: 150, w: 28, h: 28, active: true, points: 500, name: "💎" },
        { x: 482, y: 140, w: 28, h: 28, active: true, points: 500, name: "⚓" },
        { x: 260, y: 60, w: 80, h: 32, active: true, points: 1000, name: "👑 KRAKEN" }
    ];

    // PHYSICS CONSTANTS
    const GRAVITY = 0.25;
    const BOUNCE = 0.92;
    const WALL_LEFT = 20;
    const WALL_RIGHT = W - 20;
    const TOP_DEADZONE = 50;
    const BOTTOM_DRAIN = H - 15;

    // UI UPDATE
    function updateUI() {
        document.getElementById('scoreValue').innerText = Math.floor(score);
        document.getElementById('multValue').innerText = multiplier + "x";
        document.getElementById('ballsValue').innerText = ballsLeft;
    }

    // FLIPPER COLLISION (line segment)
    function flipperCollision(flip) {
        let tipX = flip.x + Math.cos(flip.angle) * flip.length;
        let tipY = flip.y + Math.sin(flip.angle) * flip.length;
        let baseX = flip.x, baseY = flip.y;
        
        let ax = tipX - baseX;
        let ay = tipY - baseY;
        let len2 = ax*ax + ay*ay;
        if (len2 === 0) return false;
        
        let t = ((ball.x - baseX)*ax + (ball.y - baseY)*ay) / len2;
        t = Math.min(1, Math.max(0, t));
        let closestX = baseX + ax * t;
        let closestY = baseY + ay * t;
        let dx = ball.x - closestX;
        let dy = ball.y - closestY;
        let dist = Math.hypot(dx, dy);
        
        if (dist < ball.r + 8) {
            let nx = dx / dist;
            let ny = dy / dist;
            let overlap = (ball.r + 8) - dist;
            ball.x += nx * overlap;
            ball.y += ny * overlap;
            
            let impulse = 7;
            if (Math.abs(flip.angle - flip.up) < 0.3 && flip.targetAngle === flip.up) {
                impulse += 3.5;
            }
            ball.vx += nx * impulse;
            ball.vy += ny * impulse;
            return true;
        }
        return false;
    }

    // BUMPER COLLISION
    function handleBumpers() {
        for (let b of bumpers) {
            let dx = ball.x - b.x;
            let dy = ball.y - b.y;
            let dist = Math.hypot(dx, dy);
            if (dist < ball.r + b.r) {
                let angle = Math.atan2(dy, dx);
                let force = 7;
                ball.vx += Math.cos(angle) * force;
                ball.vy += Math.sin(angle) * force;
                let overlap = (ball.r + b.r) - dist;
                ball.x += Math.cos(angle) * overlap;
                ball.y += Math.sin(angle) * overlap;
                
                let add = b.points * multiplier;
                score += add;
                b.flash = 8;
                updateUI();
                
                if (b.name === "🧜‍♀️" && Math.random() < 0.35) {
                    multiplier = Math.min(6, multiplier + 1);
                    updateUI();
                }
            }
            if (b.flash > 0) b.flash--;
        }
    }

    // TARGET COLLISION
    function handleTargets() {
        for (let t of targets) {
            if (!t.active) continue;
            if (ball.x + ball.r > t.x && ball.x - ball.r < t.x + t.w &&
                ball.y + ball.r > t.y && ball.y - ball.r < t.y + t.h) {
                t.active = false;
                let add = t.points * multiplier;
                score += add;
                updateUI();
                if (t.name === "👑 KRAKEN") {
                    multiplier = Math.min(6, multiplier + 2);
                    updateUI();
                }
                ball.vy -= 3;
                ball.vx += (Math.random() - 0.5) * 2;
            }
        }
    }

    // WALL COLLISION
    function handleWalls() {
        if (ball.x - ball.r < WALL_LEFT) {
            ball.x = WALL_LEFT + ball.r;
            ball.vx = -ball.vx * BOUNCE;
        }
        if (ball.x + ball.r > WALL_RIGHT) {
            ball.x = WALL_RIGHT - ball.r;
            ball.vx = -ball.vx * BOUNCE;
        }
        if (ball.y - ball.r < TOP_DEADZONE) {
            ballActive = false;
            return;
        }
        if (ball.y + ball.r > BOTTOM_DRAIN) {
            ballActive = false;
            return;
        }
        if (ball.y - ball.r < 8) {
            ball.y = 8 + ball.r;
            ball.vy = -ball.vy * 0.9;
        }
    }

    // UPDATE FLIPPERS
    function updateFlippers() {
        leftFlipper.angle += (leftFlipper.targetAngle - leftFlipper.angle) * 0.35;
        rightFlipper.angle += (rightFlipper.targetAngle - rightFlipper.angle) * 0.35;
    }

    // BALL PHYSICS
    function updateBall() {
        if (!ballActive || gameOver) return;
        
        ball.vx *= 0.995;
        ball.vy += GRAVITY;
        ball.x += ball.vx;
        ball.y += ball.vy;
        
        let maxSpeed = 14;
        if (Math.abs(ball.vx) > maxSpeed) ball.vx = ball.vx > 0 ? maxSpeed : -maxSpeed;
        if (Math.abs(ball.vy) > maxSpeed) ball.vy = ball.vy > 0 ? maxSpeed : -maxSpeed;
        
        handleWalls();
        if (!ballActive) return;
        
        flipperCollision(leftFlipper);
        flipperCollision(rightFlipper);
        
        handleBumpers();
        handleTargets();
    }

    // LOSE BALL
    function loseBall() {
        if (!ballActive && !gameOver) {
            ballsLeft--;
            updateUI();
            if (ballsLeft <= 0) {
                gameOver = true;
            } else {
                ballActive = true;
                ball.x = W/2;
                ball.y = 580;
                ball.vx = 0;
                ball.vy = 0;
                launchReady = true;
            }
        }
    }

    // LAUNCH BALL
    function launchBall() {
        if (gameOver) return;
        if (!ballActive) {
            ballActive = true;
            ball.x = W/2;
            ball.y = 580;
            ball.vx = 0;
            ball.vy = 0;
            launchReady = true;
        }
        if (launchReady && ballActive) {
            ball.vx = (Math.random() - 0.5) * 1.5;
            ball.vy = -8.5;
            launchReady = false;
        }
    }

    // RESET GAME
    function resetGame() {
        score = 0;
        multiplier = 1;
        ballsLeft = 3;
        gameOver = false;
        ballActive = true;
        launchReady = true;
        ball.x = W/2;
        ball.y = 580;
        ball.vx = 0;
        ball.vy = 0;
        for (let t of targets) t.active = true;
        updateUI();
    }

    // DRAW EVERYTHING (Underwater Theme)
    function draw() {
        ctx.clearRect(0, 0, W, H);
        
        // Deep water gradient
        let grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#022b44");
        grad.addColorStop(1, "#00101c");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        
        // Sonar grid
        ctx.strokeStyle = "rgba(0,210,255,0.15)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 12; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * 60);
            ctx.lineTo(W, i * 60);
            ctx.stroke();
        }
        
        // Draw bumpers
        for (let b of bumpers) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r-2, 0, Math.PI*2);
            ctx.fillStyle = "#0d5b70";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r-5, 0, Math.PI*2);
            ctx.fillStyle = "#0f9ac0";
            ctx.fill();
            ctx.font = `${b.r+4}px monospace`;
            ctx.fillStyle = "white";
            ctx.fillText(b.name, b.x-10, b.y+7);
            if (b.flash > 0) {
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r+3, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        // Draw targets
        for (let t of targets) {
            if (t.active) {
                ctx.fillStyle = "#ffb347";
                ctx.shadowColor = "orange";
                ctx.fillRect(t.x, t.y, t.w, t.h);
                ctx.fillStyle = "#11212e";
                ctx.font = "18px monospace";
                ctx.fillText(t.name, t.x+5, t.y+22);
            }
        }
        
        // Draw flippers
        ctx.shadowBlur = 6;
        ctx.fillStyle = "#2a8c6e";
        ctx.shadowColor = "#0ff";
        drawFlipper(leftFlipper);
        drawFlipper(rightFlipper);
        
        // Draw ball (pearl)
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r-1, 0, Math.PI*2);
        ctx.fillStyle = "#feffd2";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ball.x-2, ball.y-2, 2, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
        
        // Game messages
        if (gameOver) {
            ctx.font = "bold 28px monospace";
            ctx.fillStyle = "#ff5555";
            ctx.shadowBlur = 8;
            ctx.fillText("GAME OVER", W/2-85, H/2);
        } else if (launchReady && ballActive) {
            ctx.font = "16px monospace";
            ctx.fillStyle = "#88ffcc";
            ctx.fillText("PRESS LAUNCH", W/2-50, 90);
        }
        
        ctx.shadowBlur = 0;
    }

    function drawFlipper(f) {
        let tipX = f.x + Math.cos(f.angle) * f.length;
        let tipY = f.y + Math.sin(f.angle) * f.length;
        ctx.beginPath();
        ctx.moveTo(f.x, f.y);
        ctx.lineTo(tipX, tipY);
        ctx.lineWidth = 12;
        ctx.strokeStyle = "#6effb0";
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(f.x, f.y, 7, 0, Math.PI*2);
        ctx.fillStyle = "#47c9a5";
        ctx.fill();
    }

    // GAME LOOP
    function gameLoop() {
        updateFlippers();
        updateBall();
        if (!ballActive && !gameOver) loseBall();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // EVENT HANDLERS
    function initControls() {
        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA') { leftFlipper.targetAngle = leftFlipper.up; e.preventDefault(); }
            if (e.code === 'KeyS') { rightFlipper.targetAngle = rightFlipper.up; e.preventDefault(); }
            if (e.code === 'Space') { launchBall(); e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA') leftFlipper.targetAngle = leftFlipper.down;
            if (e.code === 'KeyS') rightFlipper.targetAngle = rightFlipper.down;
        });
        
        // Touch/Mouse buttons
        let leftBtn = document.getElementById('leftFlipBtn');
        let rightBtn = document.getElementById('rightFlipBtn');
        
        leftBtn.addEventListener('mousedown', () => leftFlipper.targetAngle = leftFlipper.up);
        leftBtn.addEventListener('mouseup', () => leftFlipper.targetAngle = leftFlipper.down);
        leftBtn.addEventListener('mouseleave', () => leftFlipper.targetAngle = leftFlipper.down);
        leftBtn.addEventListener('touchstart', (e) => { leftFlipper.targetAngle = leftFlipper.up; e.preventDefault(); });
        leftBtn.addEventListener('touchend', () => leftFlipper.targetAngle = leftFlipper.down);
        
        rightBtn.addEventListener('mousedown', () => rightFlipper.targetAngle = rightFlipper.up);
        rightBtn.addEventListener('mouseup', () => rightFlipper.targetAngle = rightFlipper.down);
        rightBtn.addEventListener('mouseleave', () => rightFlipper.targetAngle = rightFlipper.down);
        rightBtn.addEventListener('touchstart', (e) => { rightFlipper.targetAngle = rightFlipper.up; e.preventDefault(); });
        rightBtn.addEventListener('touchend', () => rightFlipper.targetAngle = rightFlipper.down);
        
        document.getElementById('launchBtn').addEventListener('click', () => launchBall());
        document.getElementById('resetBtn').addEventListener('click', () => resetGame());
    }

    // START GAME
    resetGame();
    initControls();
    gameLoop();
})();
</script>
</body>
</html>
