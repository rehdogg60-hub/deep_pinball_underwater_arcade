<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reh Dogg: DEEP PINBALL | Underwater Arcade</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #02112a, #00040c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', monospace;
            padding: 20px;
        }

        .cabinet {
            background: linear-gradient(145deg, #0c1a2f, #030b17);
            border-radius: 48px;
            padding: 20px 24px 30px;
            border: 3px solid #0ff7ff;
            box-shadow: 0 0 0 6px #0a2a3a, 0 20px 40px black, inset 0 0 20px rgba(0,255,255,0.3);
        }

        .marquee {
            text-align: center;
            background: #021a24;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 20px;
            border-bottom: 3px solid cyan;
        }

        .marquee h1 {
            margin: 0;
            font-size: clamp(1.4rem, 5vw, 2.4rem);
            letter-spacing: 4px;
            background: linear-gradient(135deg, cyan, #4effe0, #0077ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .marquee p {
            color: #7ffbff;
            margin: 5px 0 0;
            font-weight: bold;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #0cf, 0 12px 28px black;
            cursor: none;
            background: #00141f;
            width: 100%;
            height: auto;
        }

        .panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
            background: #04121ecc;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 10px 20px;
        }

        .card {
            background: #010a12;
            border-radius: 28px;
            padding: 8px 20px;
            text-align: center;
            flex: 1;
            box-shadow: inset 0 0 8px #0ff3, 0 5px 0 #002b3b;
        }

        .card span:first-child {
            font-size: 0.8rem;
            color: #8dd0ff;
        }

        .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 8px #ffaa33;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        button {
            background: #0f212e;
            border: none;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
            padding: 10px 28px;
            border-radius: 60px;
            color: cyan;
            box-shadow: 0 6px 0 #002c3d;
            cursor: pointer;
            transition: 0.05s linear;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #002c3d;
        }

        .mobile-flippers {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 12px;
        }

        .flip-btn {
            background: radial-gradient(circle at 30% 20%, #2a6f8f, #042c3b);
            width: 100px;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            color: white;
            border: 1px solid cyan;
            cursor: pointer;
            box-shadow: 0 6px 0 #001e2a;
        }

        .flip-btn:active {
            transform: translateY(4px);
        }

        @media (max-width: 700px) {
            .cabinet { padding: 12px; }
            .value { font-size: 1.2rem; }
            button { padding: 6px 16px; font-size: 0.9rem; }
            .flip-btn { width: 70px; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="cabinet">
    <div class="marquee">
        <h1>🐙 REH DOGG: DEEP PINBALL 🐟</h1>
        <p>⚡ UNDERWATER ARCADE · KRAKEN BONUS ⚡</p>
    </div>
    <canvas id="pinballCanvas" width="800" height="700" style="width:100%; max-width:800px; aspect-ratio:800/700"></canvas>
    <div class="panel">
        <div class="card"><span>🐚 SCORE</span><div class="value" id="scoreValue">0</div></div>
        <div class="card"><span>💎 MULTI</span><div class="value" id="multValue">1x</div></div>
        <div class="card"><span>🦑 BALLS</span><div class="value" id="ballsValue">3</div></div>
    </div>
    <div class="controls">
        <button id="launchBtn">🚀 LAUNCH BALL</button>
        <button id="resetBtn">🔄 NEW GAME</button>
    </div>
    <div class="mobile-flippers">
        <div class="flip-btn" id="leftFlipBtn">◀ LEFT</div>
        <div class="flip-btn" id="rightFlipBtn">RIGHT ▶</div>
    </div>
    <div style="text-align: center; margin-top: 12px; font-size: 0.7rem; color: #4fa5c2;">▼ A / S keys | SPACE to launch ▼</div>
</div>

<script>
    (function(){
        // -------------------- CANVAS --------------------
        const canvas = document.getElementById('pinballCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 700;
        canvas.width = W; canvas.height = H;

        // -------------------- GAME STATE --------------------
        let score = 0;
        let multiplier = 1;
        let ballsLeft = 3;
        let gameOver = false;
        let ballActive = true;
        let launchReady = true;

        // -------------------- BALL --------------------
        let ball = {
            x: W/2,
            y: 580,
            vx: 0,
            vy: 0,
            r: 7
        };

        // -------------------- FLIPPERS --------------------
        // left flipper (rotates around pivot)
        const leftFlipper = {
            pivotX: 130,
            pivotY: 630,
            angle: 0,        // current angle (radians)
            targetAngle: 0,
            length: 70,
            width: 14,
            upAngle: -0.7,   // raised angle
            downAngle: 0.15   // resting angle
        };
        
        const rightFlipper = {
            pivotX: W - 130,
            pivotY: 630,
            angle: 0,
            targetAngle: 0,
            length: 70,
            width: 14,
            upAngle: 0.7,
            downAngle: -0.15
        };

        // -------------------- BUMPERS (glowing sea life) --------------------
        const bumpers = [
            { x: 200, y: 240, r: 18, points: 150, color: "#0ff", name: "🐡" },
            { x: 600, y: 220, r: 18, points: 150, color: "#0ff", name: "🐙" },
            { x: 400, y: 150, r: 22, points: 250, color: "#f0f", name: "🪸" },
            { x: 280, y: 380, r: 16, points: 100, color: "#ff0", name: "🐠" },
            { x: 520, y: 390, r: 16, points: 100, color: "#ff0", name: "🐟" },
            { x: 100, y: 460, r: 14, points: 80, color: "#0fa", name: "🦐" },
            { x: 700, y: 470, r: 14, points: 80, color: "#0fa", name: "🦀" },
            { x: 400, y: 310, r: 20, points: 200, color: "#f6f", name: "🧜‍♀️" }
        ];

        // -------------------- STATIC TARGETS --------------------
        let targets = [
            { x: 120, y: 170, w: 30, h: 30, active: true, points: 500, name: "💎" },
            { x: 650, y: 160, w: 30, h: 30, active: true, points: 500, name: "⚓" },
            { x: 360, y: 70, w: 80, h: 36, active: true, points: 1000, name: "👑 KRAKEN" }
        ];

        // -------------------- PHYSICS CONSTANTS --------------------
        const GRAVITY = 0.28;
        const BOUNCE = 0.92;
        const WALL_LEFT = 25;
        const WALL_RIGHT = W - 25;
        const TOP_DEADZONE = 55;   // above this = drain
        const BOTTOM_DRAIN = H - 15;

        // -------------------- HELPER FUNCTIONS --------------------
        function updateUI() {
            document.getElementById('scoreValue').innerText = Math.floor(score);
            document.getElementById('multValue').innerText = multiplier + "x";
            document.getElementById('ballsValue').innerText = ballsLeft;
        }

        function showMessage(msg, duration = 60) {
            // simple message handling (optional)
            console.log(msg);
        }

        // -------------------- COLLISION: FLIPPER (line segment collision) --------------------
        function flipperCollision(flip, ball) {
            // calculate tip position based on current angle
            const tipX = flip.pivotX + Math.cos(flip.angle) * flip.length;
            const tipY = flip.pivotY + Math.sin(flip.angle) * flip.length;
            const baseX = flip.pivotX;
            const baseY = flip.pivotY;
            
            // find closest point on line segment (base to tip)
            const ax = tipX - baseX;
            const ay = tipY - baseY;
            const len2 = ax*ax + ay*ay;
            if (len2 === 0) return false;
            let t = ((ball.x - baseX)*ax + (ball.y - baseY)*ay) / len2;
            t = Math.min(1, Math.max(0, t));
            const closestX = baseX + ax * t;
            const closestY = baseY + ay * t;
            const dx = ball.x - closestX;
            const dy = ball.y - closestY;
            const dist = Math.hypot(dx, dy);
            
            if (dist < ball.r + flip.width/2) {
                // collision normal
                const nx = dx / dist;
                const ny = dy / dist;
                // push ball out
                const overlap = (ball.r + flip.width/2) - dist;
                ball.x += nx * overlap;
                ball.y += ny * overlap;
                // impulse: add velocity away from flipper + boost if flipper is moving upward
                let impulse = 6.5;
                // if flipper is raised (target angle vs down angle), add extra oomph
                if (Math.abs(flip.angle - flip.upAngle) < 0.3 && flip.targetAngle === flip.upAngle) {
                    impulse += 3.2;
                }
                ball.vx += nx * impulse;
                ball.vy += ny * impulse;
                return true;
            }
            return false;
        }

        // -------------------- BUMPER COLLISION --------------------
        function handleBumpers() {
            for (let b of bumpers) {
                const dx = ball.x - b.x;
                const dy = ball.y - b.y;
                const dist = Math.hypot(dx, dy);
                if (dist < ball.r + b.r) {
                    const angle = Math.atan2(dy, dx);
                    const force = 7.5;
                    ball.vx += Math.cos(angle) * force;
                    ball.vy += Math.sin(angle) * force;
                    const overlap = (ball.r + b.r) - dist;
                    ball.x += Math.cos(angle) * overlap;
                    ball.y += Math.sin(angle) * overlap;
                    // add score
                    let add = b.points * multiplier;
                    score += add;
                    updateUI();
                    // flash effect
                    b.flash = 8;
                    // mermaid special: increase multiplier
                    if (b.name === "🧜‍♀️" && Math.random() < 0.35) {
                        multiplier = Math.min(6, multiplier + 1);
                        updateUI();
                        showMessage(`MULTIPLIER UP! x${multiplier}`);
                    }
                }
            }
        }

        // -------------------- TARGET COLLISION --------------------
        function handleTargets() {
            for (let t of targets) {
                if (!t.active) continue;
                if (ball.x + ball.r > t.x && ball.x - ball.r < t.x + t.w &&
                    ball.y + ball.r > t.y && ball.y - ball.r < t.y + t.h) {
                    t.active = false;
                    let add = t.points * multiplier;
                    score += add;
                    updateUI();
                    showMessage(`+${add} ${t.name}`);
                    if (t.name === "👑 KRAKEN") {
                        multiplier = Math.min(6, multiplier + 2);
                        updateUI();
                        showMessage(`🦑 KRAKEN BONUS! x${multiplier}`);
                    }
                    // bounce effect
                    ball.vy -= 3.5;
                    ball.vx += (Math.random() - 0.5) * 2;
                }
            }
        }

        // -------------------- WALL / BOUNDARY COLLISION --------------------
        function handleWalls() {
            // left / right walls
            if (ball.x - ball.r < WALL_LEFT) {
                ball.x = WALL_LEFT + ball.r;
                ball.vx = -ball.vx * BOUNCE;
            }
            if (ball.x + ball.r > WALL_RIGHT) {
                ball.x = WALL_RIGHT - ball.r;
                ball.vx = -ball.vx * BOUNCE;
            }
            // top drain (lost ball)
            if (ball.y - ball.r < TOP_DEADZONE) {
                ballActive = false;
                return;
            }
            // bottom drain (lost ball)
            if (ball.y + ball.r > BOTTOM_DRAIN) {
                ballActive = false;
                return;
            }
            // upper bound bounce (just a soft limit)
            if (ball.y - ball.r < 10) {
                ball.y = 10 + ball.r;
                ball.vy = -ball.vy * 0.9;
            }
        }

        // -------------------- FLIPPER ANGLES UPDATE --------------------
        function updateFlippers() {
            leftFlipper.angle += (leftFlipper.targetAngle - leftFlipper.angle) * 0.35;
            rightFlipper.angle += (rightFlipper.targetAngle - rightFlipper.angle) * 0.35;
        }

        // -------------------- BALL PHYSICS STEP --------------------
        function updateBall() {
            if (!ballActive || gameOver) return;
            
            ball.vx *= 0.995;
            ball.vy += GRAVITY;
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // cap speed
            let maxSpeed = 16;
            if (Math.abs(ball.vx) > maxSpeed) ball.vx = ball.vx > 0 ? maxSpeed : -maxSpeed;
            if (Math.abs(ball.vy) > maxSpeed) ball.vy = ball.vy > 0 ? maxSpeed : -maxSpeed;
            
            handleWalls();
            if (!ballActive) return;
            
            // flipper collisions
            flipperCollision(leftFlipper, ball);
            flipperCollision(rightFlipper, ball);
            
            handleBumpers();
            handleTargets();
        }
        
        // -------------------- LOSE BALL / RESPAWN --------------------
        function loseBall() {
            if (!ballActive && !gameOver) {
                ballsLeft--;
                updateUI();
                if (ballsLeft <= 0) {
                    gameOver = true;
                    showMessage("💀 GAME OVER 💀");
                } else {
                    // reset ball to launch position
                    ballActive = true;
                    ball.x = W/2;
                    ball.y = 590;
                    ball.vx = 0;
                    ball.vy = 0;
                    launchReady = true;
                    showMessage("PRESS LAUNCH");
                }
            }
        }
        
        function launchBall() {
            if (gameOver) return;
            if (!ballActive) {
                ballActive = true;
                ball.x = W/2;
                ball.y = 590;
                ball.vx = 0;
                ball.vy = 0;
                launchReady = true;
            }
            if (launchReady && ballActive) {
                ball.vx = (Math.random() - 0.5) * 1.8;
                ball.vy = -9.2;
                launchReady = false;
                showMessage("LAUNCH!");
            }
        }
        
        function resetGame() {
            score = 0;
            multiplier = 1;
            ballsLeft = 3;
            gameOver = false;
            ballActive = true;
            launchReady = true;
            ball.x = W/2;
            ball.y = 590;
            ball.vx = 0;
            ball.vy = 0;
            // reset targets
            for (let t of targets) t.active = true;
            updateUI();
            showMessage("NEW GAME!");
        }
        
        // -------------------- DRAW EVERYTHING (underwater theme) --------------------
        function draw() {
            ctx.clearRect(0, 0, W, H);
            // deep water gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, "#022b44");
            grad.addColorStop(1, "#00101c");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            // sonar grid
            ctx.strokeStyle = "rgba(0,210,255,0.18)";
            ctx.lineWidth = 1;
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * 60);
                ctx.lineTo(W, i * 60);
                ctx.stroke();
            }
            
            // bumpers
            for (let b of bumpers) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#0cf";
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r-2, 0, Math.PI*2);
                ctx.fillStyle = "#0d5b70";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r-5, 0, Math.PI*2);
                ctx.fillStyle = "#0f9ac0";
                ctx.fill();
                ctx.font = `${b.r+6}px monospace`;
                ctx.fillStyle = "white";
                ctx.shadowBlur = 6;
                ctx.fillText(b.name, b.x-12, b.y+8);
                if (b.flash) {
                    b.flash--;
                    ctx.fillStyle = "cyan";
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r+4, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // targets
            for (let t of targets) {
                if (t.active) {
                    ctx.fillStyle = "#ffb347";
                    ctx.shadowColor = "orange";
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.fillStyle = "#11212e";
                    ctx.font = "20px monospace";
                    ctx.fillText(t.name, t.x+5, t.y+22);
                }
            }
            
            // flippers (coral style)
            ctx.shadowBlur = 8;
            ctx.fillStyle = "#2a8c6e";
            ctx.shadowColor = "#0ff";
            drawFlipper(leftFlipper);
            drawFlipper(rightFlipper);
            
            // ball (pearl)
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r-1, 0, Math.PI*2);
            ctx.fillStyle = "#feffd2";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ball.x-2, ball.y-2, 2, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            
            if (gameOver) {
                ctx.font = "bold 36px monospace";
                ctx.fillStyle = "#ff5555";
                ctx.shadowBlur = 8;
                ctx.fillText("GAME OVER", W/2-110, H/2);
            } else if (launchReady && ballActive) {
                ctx.font = "20px monospace";
                ctx.fillStyle = "#88ffcc";
                ctx.fillText("PRESS LAUNCH", W/2-70, 95);
            }
            ctx.shadowBlur = 0;
        }
        
        function drawFlipper(f) {
            const tipX = f.pivotX + Math.cos(f.angle) * f.length;
            const tipY = f.pivotY + Math.sin(f.angle) * f.length;
            ctx.beginPath();
            ctx.moveTo(f.pivotX, f.pivotY);
            ctx.lineTo(tipX, tipY);
            ctx.lineWidth = f.width;
            ctx.strokeStyle = "#6effb0";
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(f.pivotX, f.pivotY, 8, 0, Math.PI*2);
            ctx.fillStyle = "#47c9a5";
            ctx.fill();
        }
        
        // -------------------- GAME LOOP --------------------
        function gameLoop() {
            updateFlippers();
            updateBall();
            if (!ballActive && !gameOver) loseBall();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // -------------------- EVENT HANDLERS --------------------
        function initControls() {
            // keyboard
            window.addEventListener('keydown', (e) => {
                if (e.code === 'KeyA') { leftFlipper.targetAngle = leftFlipper.upAngle; e.preventDefault(); }
                if (e.code === 'KeyS') { rightFlipper.targetAngle = rightFlipper.upAngle; e.preventDefault(); }
                if (e.code === 'Space') { launchBall(); e.preventDefault(); }
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'KeyA') leftFlipper.targetAngle = leftFlipper.downAngle;
                if (e.code === 'KeyS') rightFlipper.targetAngle = rightFlipper.downAngle;
            });
            // touch / mouse buttons
            const leftBtn = document.getElementById('leftFlipBtn');
            const rightBtn = document.getElementById('rightFlipBtn');
            leftBtn.addEventListener('mousedown', () => leftFlipper.targetAngle = leftFlipper.upAngle);
            leftBtn.addEventListener('mouseup', () => leftFlipper.targetAngle = leftFlipper.downAngle);
            leftBtn.addEventListener('touchstart', (e) => { leftFlipper.targetAngle = leftFlipper.upAngle; e.preventDefault(); });
            leftBtn.addEventListener('touchend', () => leftFlipper.targetAngle = leftFlipper.downAngle);
            rightBtn.addEventListener('mousedown', () => rightFlipper.targetAngle = rightFlipper.upAngle);
            rightBtn.addEventListener('mouseup', () => rightFlipper.targetAngle = rightFlipper.downAngle);
            rightBtn.addEventListener('touchstart', (e) => { rightFlipper.targetAngle = rightFlipper.upAngle; e.preventDefault(); });
            rightBtn.addEventListener('touchend', () => rightFlipper.targetAngle = rightFlipper.downAngle);
            document.getElementById('launchBtn').addEventListener('click', () => launchBall());
            document.getElementById('resetBtn').addEventListener('click', () => resetGame());
        }
        
        // start game
        resetGame();
        initControls();
        gameLoop();
        
        // bumper flash cleanup
        setInterval(() => {
            for (let b of bumpers) if (b.flash) b.flash--;
        }, 50);
    })();
</script>
</body>
</html>
